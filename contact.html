    <main>
        <aside>
            <ul>
                <li>
                    <a href="https://italianbrainrotcharacters.com/tralalero-tralala">Tralalero Tralala</a>
                </li>
                <li>
                    <a href="https://italianbrainrotcharacters.com/bombardiro-crocodilo">Bombardiro Crocodilo</a>

                        Sahur</a>
                </li>
            </ul>
        </aside>
        <section>
            <h2>Contact us</h2>
            <p>Complaints? Questions? Feedback? Contact us!</p>
            <form action="http://foo.com" method="get">
                <label for="first_name">First name:<span class="required">*</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last name:<span class="required">*</span></label>
                <input type="text" name="last_name" id="last_name" required><br>

                <label for="email">Email:<span class="required">*</span></label>
                <input type="email" name="email" id="email" required placeholder="johnsmith@example.com"><br>

                <label for="gender">Gender :</label>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <input type="radio" name="gender" value="other" checked> Other <br>

                <label for="message">Query : </label>
                <textarea cols="40" rows="6" id="message" name="message" placeholder="Your message must be less than 200 characters" data-maxlength="200"></textarea>
                <input type="submit" name="submit" id="button" value="Submit">
                <input type="reset" name="reset" id="reset">

            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026</p>
